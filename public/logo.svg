<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Safe Companion India">
  <defs>
    <linearGradient id="scGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="scGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="scGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield mark -->
  <g transform="translate(4,6)" filter="url(#scGlow)">
    <path d="M26 0 L52 8 V28 C52 42 40 50 26 52 C12 50 0 42 0 28 V8 Z"
          fill="url(#scGrad)"/>
    <path d="M26 4 L48 11 V28 C48 39 38 46 26 48 C14 46 4 39 4 28 V11 Z"
          fill="#0b1224" opacity="0.55"/>
    <!-- Heart inside shield -->
    <path d="M26 38 C18 32 10 26 10 19 C10 14.5 13.5 11 18 11 C21 11 23.5 12.5 26 15.5 C28.5 12.5 31 11 34 11 C38.5 11 42 14.5 42 19 C42 26 34 32 26 38 Z"
          fill="url(#scGrad2)"/>
    <!-- Tick / check inside heart for trust -->
    <path d="M19 23 L24 28 L34 18" stroke="#ffffff" stroke-width="2.6"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(68,0)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="0" y="28" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.3">
      Safe<tspan fill="url(#scGrad)"> Companion</tspan>
    </text>
    <text x="0" y="48" font-size="11" font-weight="600" fill="#9aa3b2" letter-spacing="3.4">
      I N D I A  ·  V E R I F I E D
    </text>
  </g>
</svg>
